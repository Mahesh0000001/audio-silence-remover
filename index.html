<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6200ee">
    <title>Audio Silence Remover</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f7f9fc; -webkit-tap-highlight-color: transparent; }
        .android-card { box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-radius: 28px; }
        .ripple { position: relative; overflow: hidden; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6200ee; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        canvas { width: 100%; height: 100px; background: #f1f1f1; border-radius: 16px; }
    </style>
</head>
<body class="p-4 md:p-8 flex justify-center items-start min-h-screen">

    <div class="max-w-md w-full bg-white android-card p-6 md:p-8">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Silence Remover</h1>
                <p class="text-sm text-gray-500 mt-1">Supports up to 2 hours.</p>
            </div>
            <button id="cancelBtn" class="hidden text-gray-400 hover:text-red-500 p-2" title="Reset">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </header>

        <div id="dropZone" class="border-2 border-dashed border-purple-200 rounded-3xl p-8 text-center cursor-pointer hover:border-purple-400 mb-6">
            <input type="file" id="audioInput" accept="audio/*" class="hidden">
            <div class="flex flex-col items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-purple-600 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                </svg>
                <span class="text-gray-700 font-medium text-sm">Select Audio File</span>
            </div>
        </div>

        <div id="controls" class="hidden space-y-6">
            <div class="bg-gray-50 p-4 rounded-2xl">
                <div class="flex justify-between mb-2">
                    <label class="text-xs font-bold text-gray-500 uppercase">Sensitivity</label>
                    <span id="thresholdVal" class="text-xs font-mono text-purple-600 font-bold">0.01</span>
                </div>
                <input type="range" id="threshold" min="0.001" max="0.1" step="0.001" value="0.01" class="w-full h-2">
            </div>

            <button id="processBtn" class="ripple w-full py-4 bg-purple-600 text-white rounded-2xl font-bold text-lg shadow-lg">
                <span id="btnText">Remove Silence</span>
                <div id="btnLoader" class="loader hidden mx-auto"></div>
            </button>
        </div>

        <div id="resultArea" class="hidden mt-8 border-t pt-6">
            <canvas id="waveformCanvas" class="mb-4"></canvas>
            <audio id="audioPlayer" controls class="w-full mb-4"></audio>
            <button id="downloadBtn" class="w-full py-4 bg-green-600 text-white rounded-2xl font-bold shadow-lg">
                DOWNLOAD MP3
            </button>
            <p class="text-[10px] text-gray-400 text-center mt-3 uppercase tracking-widest">Tap Download then long-press player if needed</p>
        </div>

        <div id="status" class="mt-4 text-center text-xs font-medium text-gray-400 h-4"></div>
    </div>

    <script>
        const audioInput = document.getElementById('audioInput'), dropZone = document.getElementById('dropZone'), controls = document.getElementById('controls'), processBtn = document.getElementById('processBtn'), cancelBtn = document.getElementById('cancelBtn'), btnLoader = document.getElementById('btnLoader'), btnText = document.getElementById('btnText'), status = document.getElementById('status'), resultArea = document.getElementById('resultArea'), audioPlayer = document.getElementById('audioPlayer'), downloadBtn = document.getElementById('downloadBtn'), canvas = document.getElementById('waveformCanvas'), ctx = canvas.getContext('2d'), thresholdInput = document.getElementById('threshold'), thresholdVal = document.getElementById('thresholdVal');

        let audioContext, originalBuffer, processedBlob;

        thresholdInput.oninput = () => thresholdVal.innerText = thresholdInput.value;
        dropZone.onclick = () => audioInput.click();
        audioInput.onchange = handleFileSelect;
        cancelBtn.onclick = () => location.reload();

        function handleFileSelect(e) {
            const file = e.target.files[0]; if (!file) return;
            status.innerText = "Decompressing..."; dropZone.classList.add('hidden'); cancelBtn.classList.remove('hidden');
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    originalBuffer = await audioContext.decodeAudioData(ev.target.result);
                    status.innerText = "Ready to process"; controls.classList.remove('hidden');
                } catch (err) { status.innerText = "Error loading file."; }
            };
            reader.readAsArrayBuffer(file);
        }

        processBtn.onclick = async () => {
            if (!originalBuffer) return;
            setLoading(true); status.innerText = "Processing & Encoding MP3...";
            setTimeout(async () => {
                try {
                    const threshold = parseFloat(thresholdInput.value);
                    const processedBuffer = trimSilence(originalBuffer, threshold, 0.3);
                    drawWaveform(processedBuffer);
                    processedBlob = await bufferToMp3(processedBuffer);
                    audioPlayer.src = URL.createObjectURL(processedBlob);
                    resultArea.classList.remove('hidden');
                    status.innerText = "Finished!";
                } catch (err) { status.innerText = "Processing error."; }
                setLoading(false);
            }, 100);
        };

        function setLoading(isLoading) {
            btnLoader.classList.toggle('hidden', !isLoading);
            btnText.innerText = isLoading ? "" : "Remove Silence";
            processBtn.disabled = isLoading;
        }

        function trimSilence(buffer, threshold, minSilenceDuration) {
            const data = buffer.getChannelData(0), sr = buffer.sampleRate, minSamples = minSilenceDuration * sr;
            const regions = []; let audible = false, start = 0, silCount = 0;
            for (let i = 0; i < data.length; i++) {
                if (Math.abs(data[i]) > threshold) {
                    if (!audible) { start = i; audible = true; }
                    silCount = 0;
                } else if (audible) {
                    if (++silCount > minSamples) { regions.push({start, end: i-silCount}); audible = false; }
                }
            }
            if (audible) regions.push({start, end: data.length});
            const total = regions.reduce((a, r) => a + (r.end - r.start), 0);
            const newBuf = audioContext.createBuffer(buffer.numberOfChannels, total, sr);
            for (let c = 0; c < buffer.numberOfChannels; c++) {
                const oldD = buffer.getChannelData(c), newD = newBuf.getChannelData(c);
                let off = 0; for (const r of regions) { newD.set(oldD.subarray(r.start, r.end), off); off += (r.end - r.start); }
            }
            return newBuf;
        }

        function drawWaveform(buffer) {
            const data = buffer.getChannelData(0), step = Math.ceil(data.length / canvas.width), amp = canvas.height / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#9333ea';
            for (let i = 0; i < canvas.width; i++) {
                let min = 1.0, max = -1.0;
                for (let j = 0; j < step; j++) {
                    const datum = data[(i * step) + j];
                    if (datum < min) min = datum; if (datum > max) max = datum;
                }
                ctx.fillRect(i, (1 + min) * amp, 1, Math.max(1, (max - min) * amp));
            }
        }

        async function bufferToMp3(buffer) {
            const encoder = new lamejs.Mp3Encoder(buffer.numberOfChannels, buffer.sampleRate, 128);
            const mp3Data = []; const L = buffer.getChannelData(0), R = buffer.numberOfChannels > 1 ? buffer.getChannelData(1) : L;
            const size = 1152;
            for (let i = 0; i < L.length; i += size) {
                const l16 = new Int16Array(size), r16 = new Int16Array(size);
                for (let j = 0; j < size && (i + j) < L.length; j++) {
                    l16[j] = L[i + j] * 32767; r16[j] = R[i + j] * 32767;
                }
                const buf = encoder.encodeBuffer(l16, r16); if (buf.length > 0) mp3Data.push(buf);
            }
            mp3Data.push(encoder.flush());
            return new Blob(mp3Data, { type: 'audio/mp3' });
        }

        // CORRECT DOWNLOAD FIX FOR APK
        downloadBtn.onclick = () => {
            if (!processedBlob) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const dataUrl = e.target.result;
                const newWindow = window.open();
                newWindow.document.write('<title>Save MP3</title><body style="background:#f7f9fc;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;font-family:sans-serif;text-align:center;padding:20px;">');
                newWindow.document.write('<h2 style="color:#1f2937">Audio is Ready</h2>');
                newWindow.document.write('<audio controls src="' + dataUrl + '" style="width:100%;margin:20px 0;"></audio>');
                newWindow.document.write('<a href="' + dataUrl + '" download="silence_removed.mp3" style="background:#16a34a;color:white;padding:20px 40px;text-decoration:none;border-radius:15px;font-weight:bold;font-size:18px;display:block;width:80%;">SAVE TO DOWNLOADS</a>');
                newWindow.document.write('<p style="margin-top:30px;font-size:14px;color:#6b7280;">If button fails: <br>1. Long-press the player above<br>2. Select "Download audio"</p>');
                newWindow.document.write('</body>');
            };
            reader.readAsDataURL(processedBlob);
        };
    </script>
</body>
</html>
